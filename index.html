<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PM Field Notes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #050505;
            color: #e5e5e5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 4px; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .panel-bg { background-color: #121212; }
        .input-bg { background-color: #1a1a1a; }
        .border-subtle { border-color: #262626; }
        
        .status-contacted { border-left-color: #737373 !important; } 
        .status-estimating { border-left-color: #3b82f6 !important; } 
        .status-quoted { border-left-color: #f59e0b !important; } 
        .status-done { border-left-color: #10b981 !important; } 
        .status-completed { border-left-color: #8b5cf6 !important; } 

        /* Swipe Action Styling */
        .swipe-card { transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); }
        .pinned-note { border-color: #525252; background: linear-gradient(180deg, #18181b 0%, #121212 100%); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-[#0a0a0a] border-b border-subtle p-4 flex items-center justify-between shrink-0 z-40">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-semibold tracking-tight text-white flex items-center gap-2">
                <i data-lucide="hard-hat" class="w-5 h-5 text-neutral-400"></i> Field Notes
            </h1>
            <span class="text-[10px] font-mono text-neutral-600 border border-[#262626] bg-[#121212] px-2 py-0.5 rounded-sm uppercase tracking-widest hidden md:inline-block">Build v1.9</span>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="toggleGlobalSearch()" class="text-neutral-400 hover:text-white transition-colors bg-[#1a1a1a] border border-subtle p-2 rounded-full shadow-sm">
                <i data-lucide="search" class="w-4 h-4"></i>
            </button>
            <button onclick="toggleMobileView()" class="md:hidden text-sm font-medium text-neutral-400 hover:text-white transition-colors" id="mobileToggleBtn">
                View Job Details
            </button>
        </div>
    </header>

    <div id="globalSearchOverlay" class="hidden absolute top-[70px] left-0 w-full z-50 p-4">
        <div class="max-w-2xl mx-auto panel-bg border border-subtle rounded-xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-4 border-b border-subtle flex items-center gap-3 bg-[#0a0a0a]">
                <i data-lucide="search" class="w-5 h-5 text-neutral-500 shrink-0"></i>
                <input type="text" id="globalSearchInput" placeholder="Search all jobs, notes, specs, and addresses..." class="flex-1 bg-transparent text-sm text-white focus:outline-none placeholder-neutral-600" oninput="executeGlobalSearch(this.value)">
                <button onclick="toggleGlobalSearch()" class="text-neutral-500 hover:text-white shrink-0"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="globalSearchResults" class="max-h-80 overflow-y-auto custom-scrollbar p-2 hidden flex-col gap-1"></div>
        </div>
    </div>

    <main class="flex-1 w-full flex flex-col md:flex-row overflow-hidden relative">
        
        <div id="leftPanel" class="w-full md:w-[400px] lg:w-[450px] flex flex-col border-r border-subtle h-full absolute md:relative z-30 bg-[#050505] transition-transform duration-300">
            
            <div class="p-4 border-b border-subtle shrink-0 relative z-40 bg-[#050505]">
                <div class="panel-bg border border-subtle rounded-xl p-5 shadow-lg flex flex-col gap-4">
                    <label class="block text-xs font-semibold text-neutral-500 uppercase tracking-wider">Fast Entry Logging</label>
                    
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="target" class="w-4 h-4 text-neutral-500"></i>
                        </div>
                        <input type="text" id="jobSearchInput" placeholder="Select target job..." 
                               class="w-full input-bg border border-subtle rounded-lg py-2.5 pl-10 pr-10 text-sm focus:outline-none focus:border-white text-white font-medium transition-colors shadow-inner"
                               autocomplete="off">
                        
                        <button id="clearJobSearchBtn" onclick="clearTargetJob()" class="hidden absolute inset-y-0 right-0 pr-3 flex items-center text-neutral-500 hover:text-white">
                            <i data-lucide="x-circle" class="w-4 h-4"></i>
                        </button>
                        
                        <input type="hidden" id="quickNoteJobId">
                        <div id="jobDropdown" class="hidden absolute top-full mt-2 w-full panel-bg border border-subtle rounded-lg shadow-xl z-50 max-h-48 overflow-y-auto"></div>
                    </div>

                    <textarea id="quickNoteText" rows="1" placeholder="Type or dictate site updates..." 
                              oninput="autoExpand(this)"
                              class="w-full input-bg border border-subtle rounded-lg p-3 text-sm focus:outline-none focus:border-neutral-500 transition-colors resize-none shadow-inner overflow-hidden"></textarea>
                    
                    <div id="imagePreviewContainer" class="hidden relative w-full h-32 rounded-md border border-subtle bg-black overflow-hidden flex items-center justify-center">
                        <img id="imagePreview" src="" class="max-w-full max-h-full object-contain">
                        <button onclick="clearImage()" class="absolute top-2 right-2 bg-black/80 p-1.5 rounded text-white hover:text-red-400 backdrop-blur-sm transition-colors">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>

                    <div class="flex gap-2 items-center justify-between">
                        <label class="p-2.5 input-bg border border-subtle rounded-lg text-neutral-400 hover:text-white hover:border-neutral-500 transition-colors cursor-pointer inline-block shadow-sm">
                            <i data-lucide="camera" class="w-5 h-5"></i>
                            <input type="file" accept="image/*" capture="environment" class="hidden" id="cameraInput" onchange="handleImageSelection(event)">
                        </label>
                        <button id="submitNoteBtn" onclick="submitQuickNote()" class="flex-1 bg-white hover:bg-neutral-200 text-black px-4 py-2.5 rounded-lg text-sm font-bold transition-all shadow-sm">
                            Log Note
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex-1 flex flex-col min-h-0 relative z-20">
                <div class="px-4 pt-4 pb-2 shrink-0 space-y-3">
                    <div class="flex items-center justify-between">
                        <h2 class="text-sm font-semibold text-neutral-400 uppercase tracking-wider">Active Tickets</h2>
                        <button onclick="openNewJobModal()" class="text-xs bg-neutral-800 hover:bg-neutral-700 text-neutral-200 px-3 py-1.5 rounded-md flex items-center gap-1.5 transition-colors border border-subtle font-medium shadow-sm">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> New Ticket
                        </button>
                    </div>
                    
                    <div class="flex items-center gap-2 overflow-x-auto hide-scrollbar pb-1">
                        <button onclick="setDashboardFilter('all')" id="flt-all" class="filter-btn bg-neutral-800 text-white text-[10px] uppercase font-bold px-3 py-1.5 rounded-full border border-neutral-600 whitespace-nowrap shrink-0 transition-colors">All</button>
                        <button onclick="setDashboardFilter('contacted')" id="flt-contacted" class="filter-btn input-bg text-neutral-500 text-[10px] uppercase font-bold px-3 py-1.5 rounded-full border border-subtle whitespace-nowrap shrink-0 transition-colors hover:text-white">Contacted</button>
                        <button onclick="setDashboardFilter('estimating')" id="flt-estimating" class="filter-btn input-bg text-neutral-500 text-[10px] uppercase font-bold px-3 py-1.5 rounded-full border border-subtle whitespace-nowrap shrink-0 transition-colors hover:text-white">Estimating</button>
                        <button onclick="setDashboardFilter('quoted')" id="flt-quoted" class="filter-btn input-bg text-neutral-500 text-[10px] uppercase font-bold px-3 py-1.5 rounded-full border border-subtle whitespace-nowrap shrink-0 transition-colors hover:text-white">Quoted</button>
                        <button onclick="setDashboardFilter('done')" id="flt-done" class="filter-btn input-bg text-neutral-500 text-[10px] uppercase font-bold px-3 py-1.5 rounded-full border border-subtle whitespace-nowrap shrink-0 transition-colors hover:text-white">Done</button>
                    </div>
                </div>
                
                <div id="jobListContainer" class="p-4 pt-0 space-y-3 flex-1 overflow-y-auto pr-3 custom-scrollbar overflow-x-hidden">
                    </div>
            </div>
        </div>

        <div id="rightPanel" class="w-full md:flex-1 h-full bg-[#050505] absolute md:relative z-10 hidden md:flex flex-col translate-x-full md:translate-x-0 transition-transform duration-300">
            
            <div id="jobDetailHeader" class="panel-bg border-b border-subtle p-4 flex items-center gap-4 shrink-0 hidden z-20">
                <button onclick="toggleMobileView()" class="md:hidden text-neutral-400 hover:text-white p-2 -ml-2 rounded-lg transition-colors">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </button>
                <div class="flex-1">
                    <div class="flex flex-wrap items-center gap-3 mb-1">
                        <h2 id="detailJobName" class="text-lg font-bold text-white leading-tight"></h2>
                        <div class="relative">
                            <button id="detailJobStatus" onclick="toggleStatusMenu(event)" class="text-[10px] uppercase font-bold px-2 py-0.5 rounded-sm flex items-center gap-1 cursor-pointer hover:opacity-80 transition-opacity">
                                <span id="detailJobStatusText"></span> <i data-lucide="chevron-down" class="w-3 h-3"></i>
                            </button>
                            <div id="statusUpdateMenu" class="hidden absolute top-full left-0 mt-2 w-40 bg-[#121212] border border-subtle rounded-md shadow-2xl overflow-hidden py-1">
                                <button onclick="updateJobStatus('contacted')" class="w-full text-left px-4 py-2 text-xs text-neutral-300 hover:bg-[#1a1a1a] hover:text-white font-semibold">Contacted</button>
                                <button onclick="updateJobStatus('estimating')" class="w-full text-left px-4 py-2 text-xs text-blue-400 hover:bg-[#1a1a1a] hover:text-blue-300 font-semibold">Estimating</button>
                                <button onclick="updateJobStatus('quoted')" class="w-full text-left px-4 py-2 text-xs text-amber-500 hover:bg-[#1a1a1a] hover:text-amber-400 font-semibold">Quoted</button>
                                <button onclick="updateJobStatus('done')" class="w-full text-left px-4 py-2 text-xs text-emerald-500 hover:bg-[#1a1a1a] hover:text-emerald-400 font-semibold">Done</button>
                                <button onclick="updateJobStatus('completed')" class="w-full text-left px-4 py-2 text-xs text-purple-400 hover:bg-[#1a1a1a] hover:text-purple-300 font-semibold">Completed</button>
                            </div>
                        </div>
                    </div>
                    <a id="detailJobAddress" target="_blank" class="text-xs text-blue-400 hover:text-blue-300 flex items-center gap-1 w-fit transition-colors"></a>
                </div>
                <button onclick="archiveCurrentJob()" class="text-xs font-medium text-neutral-400 hover:text-white border border-subtle bg-input-bg px-3 py-2 rounded-md flex items-center gap-1.5 transition-colors shadow-sm">
                    <i data-lucide="archive" class="w-3.5 h-3.5"></i> Archive
                </button>
            </div>

            <div id="emptyDetailState" class="flex-1 flex flex-col items-center justify-center text-neutral-600">
                <i data-lucide="clipboard-list" class="w-12 h-12 mb-3 opacity-20"></i>
                <p class="text-sm">Select a job ticket to view details.</p>
            </div>

            <div class="flex-1 overflow-y-auto p-4 md:p-6 flex flex-col gap-5 hidden" id="jobNotesFeed">
                </div>
        </div>
    </main>

    <div id="imageViewerModal" class="hidden fixed inset-0 z-[60] bg-black/95 items-center justify-center p-2 md:p-8 backdrop-blur-sm transition-opacity">
        <button onclick="closeImageViewer()" class="absolute top-4 right-4 md:top-6 md:right-6 text-neutral-400 hover:text-white p-2 z-[70] bg-black/50 rounded-full transition-colors"><i data-lucide="x" class="w-8 h-8"></i></button>
        <img id="viewerImage" src="" class="max-w-full max-h-full object-contain rounded-md shadow-2xl">
    </div>

    <div id="newJobModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="panel-bg border border-subtle w-full max-w-md rounded-xl shadow-2xl flex flex-col">
            <div class="p-5 border-b border-subtle flex items-center justify-between">
                <h3 class="font-bold text-white text-lg">Create Job Ticket</h3>
                <button onclick="closeNewJobModal()" class="text-neutral-400 hover:text-white p-1 rounded-md transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-5 space-y-5">
                <div>
                    <label class="block text-xs font-semibold uppercase text-neutral-500 mb-1.5">Client / Project Name</label>
                    <input type="text" id="newJobName" class="w-full input-bg border border-subtle rounded-md px-3 py-2.5 text-sm text-white focus:outline-none focus:border-white transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-neutral-500 mb-1.5">Address or Phase</label>
                    <input type="text" id="newJobAddress" class="w-full input-bg border border-subtle rounded-md px-3 py-2.5 text-sm text-white focus:outline-none focus:border-white transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-neutral-500 mb-2">Pipeline Status</label>
                    <div class="grid grid-cols-2 gap-2 mb-1">
                        <button type="button" onclick="setModalStatus('contacted')" id="btn-status-contacted" class="status-btn bg-neutral-800 border border-neutral-600 text-white text-xs font-semibold py-2 rounded-md transition-colors shadow-sm">Contacted</button>
                        <button type="button" onclick="setModalStatus('estimating')" id="btn-status-estimating" class="status-btn input-bg border border-subtle text-neutral-400 text-xs font-semibold py-2 rounded-md transition-colors hover:bg-neutral-800">Estimating</button>
                        <button type="button" onclick="setModalStatus('quoted')" id="btn-status-quoted" class="status-btn input-bg border border-subtle text-neutral-400 text-xs font-semibold py-2 rounded-md transition-colors hover:bg-neutral-800">Quoted</button>
                        <button type="button" onclick="setModalStatus('done')" id="btn-status-done" class="status-btn input-bg border border-subtle text-neutral-400 text-xs font-semibold py-2 rounded-md transition-colors hover:bg-neutral-800">Done</button>
                        <button type="button" onclick="setModalStatus('completed')" id="btn-status-completed" class="status-btn col-span-2 input-bg border border-subtle text-neutral-400 text-xs font-semibold py-2 rounded-md transition-colors hover:bg-neutral-800">Completed</button>
                    </div>
                    <input type="hidden" id="newJobStatus" value="contacted">
                </div>
            </div>
            <div class="p-5 border-t border-subtle flex justify-end gap-3 bg-[#0a0a0a] rounded-b-xl">
                <button onclick="closeNewJobModal()" class="px-4 py-2.5 text-sm font-medium text-neutral-400 hover:text-white transition-colors">Cancel</button>
                <button onclick="saveNewJob()" class="px-6 py-2.5 bg-white text-black text-sm font-bold rounded-md hover:bg-neutral-200 transition-colors shadow-sm">Create Ticket</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Integrated Configuration Object directly from console snapshot
        const firebaseConfig = {
            apiKey: "AIzaSyAspc3YUZVBNvfGjbjKykwPvxeRoyAtYk",
            authDomain: "quicknote-eeec2.firebaseapp.com",
            projectId: "quicknote-eeec2",
            storageBucket: "quicknote-eeec2.firebasestorage.app",
            messagingSenderId: "685197145287",
            appId: "1:685197145287:web:e32694b20f79800ec23ae2",
            measurementId: "G-53CQXRLK2B"
        };

        // Initialize Firebase Backend
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Core Reactive Application State Arrays
        let jobs = [];
        let notes = [];
        let currentOpenJobId = null;
        let pendingImageData = null;
        let isMobileDetailView = false;
        let currentDashboardFilter = 'all';

        // --- REAL-TIME DATABASE ENGINE SYNCHRONIZERS ---
        onSnapshot(collection(db, "jobs"), (snapshot) => {
            jobs = [];
            snapshot.forEach((doc) => {
                jobs.push({ id: doc.id, ...doc.data() });
            });
            renderDashboard();
            renderJobHeader();
        });

        onSnapshot(collection(db, "notes"), (snapshot) => {
            notes = [];
            snapshot.forEach((doc) => {
                notes.push({ id: doc.id, ...doc.data() });
            });
            renderDashboard();
            if (currentOpenJobId) {
                renderJobNotes();
            }
        });

        // Initialize Native Input Setup on Load Execution
        setupDropdownLogic();
        lucide.createIcons();

        // Global Outside Click Focus Modifiers
        document.addEventListener('click', (e) => {
            const statusBtn = document.getElementById('detailJobStatus');
            const statusMenu = document.getElementById('statusUpdateMenu');
            if (statusBtn && !statusBtn.contains(e.target) && !statusMenu.contains(e.target)) {
                statusMenu.classList.add('hidden');
            }
            
            const gSearchOverlay = document.getElementById('globalSearchOverlay');
            const gSearchBtn = document.querySelector('button[onclick="toggleGlobalSearch()"]');
            if(gSearchOverlay && !gSearchOverlay.classList.contains('hidden') && !gSearchOverlay.contains(e.target) && !gSearchBtn.contains(e.target)){
                gSearchOverlay.classList.add('hidden');
            }
        });

        // --- FAST ENTRY ENGINE ---
        function autoExpand(field) {
            field.style.height = '1px';
            field.style.height = field.scrollHeight + 'px';
        }

        function resetTextarea() {
            const field = document.getElementById('quickNoteText');
            field.value = '';
            field.style.height = 'auto';
        }

        function clearTargetJob() {
            const input = document.getElementById('jobSearchInput');
            input.value = '';
            input.classList.remove('text-emerald-400');
            input.classList.add('text-white');
            document.getElementById('quickNoteJobId').value = '';
            document.getElementById('clearJobSearchBtn').classList.add('hidden');
            document.getElementById('jobDropdown').classList.add('hidden');
        }

        function setupDropdownLogic() {
            const input = document.getElementById('jobSearchInput');
            const dropdown = document.getElementById('jobDropdown');
            const hiddenId = document.getElementById('quickNoteJobId');
            const clearBtn = document.getElementById('clearJobSearchBtn');

            if(!input) return;

            input.addEventListener('focus', () => {
                dropdown.classList.remove('hidden');
                filterDropdown(input.value);
            });

            input.addEventListener('input', (e) => {
                filterDropdown(e.target.value);
                hiddenId.value = ''; 
                input.classList.remove('text-emerald-400'); 
                input.classList.add('text-white');
                
                if (e.target.value.trim() !== '') clearBtn.classList.remove('hidden');
                else clearBtn.classList.add('hidden');
            });

            document.addEventListener('click', (e) => {
                if (!input.contains(e.target) && !dropdown.contains(e.target) && !clearBtn.contains(e.target)) {
                    dropdown.classList.add('hidden');
                }
            });
        }

        function filterDropdown(query = '') {
            const dropdown = document.getElementById('jobDropdown');
            dropdown.innerHTML = '';
            
            const activeJobs = jobs.filter(j => !j.archived);
            const filtered = activeJobs.filter(j => j.name.toLowerCase().includes(query.toLowerCase()) || j.address.toLowerCase().includes(query.toLowerCase()));

            if (filtered.length === 0) {
                dropdown.innerHTML = `<div class="p-3 text-xs text-neutral-500">No active jobs found.</div>`;
                return;
            }

            filtered.forEach(job => {
                const div = document.createElement('div');
                div.className = 'p-3 hover:bg-neutral-800 cursor-pointer border-b border-subtle last:border-0 transition-colors';
                div.innerHTML = `<div class="text-sm font-semibold text-white">${job.name}</div><div class="text-xs text-neutral-500 truncate mt-0.5">${job.address}</div>`;
                div.onclick = () => {
                    const input = document.getElementById('jobSearchInput');
                    input.value = job.name;
                    input.classList.remove('text-white');
                    input.classList.add('text-emerald-400'); 
                    document.getElementById('quickNoteJobId').value = job.id;
                    document.getElementById('clearJobSearchBtn').classList.remove('hidden');
                    dropdown.classList.add('hidden');
                };
                dropdown.appendChild(div);
            });
        }

        // --- GLOBAL SEARCH SYSTEM ---
        function toggleGlobalSearch() {
            const overlay = document.getElementById('globalSearchOverlay');
            overlay.classList.toggle('hidden');
            if(!overlay.classList.contains('hidden')){
                document.getElementById('globalSearchInput').focus();
                executeGlobalSearch('');
            }
        }

        function executeGlobalSearch(query) {
            const container = document.getElementById('globalSearchResults');
            container.innerHTML = '';
            container.classList.remove('hidden');
            
            const q = query.toLowerCase().trim();
            if(!q) return;

            let resultsHTML = '';
            let matches = 0;

            jobs.filter(j => !j.archived).forEach(job => {
                if(job.name.toLowerCase().includes(q) || job.address.toLowerCase().includes(q)) {
                    resultsHTML += `
                        <div onclick="jumpToJob('${job.id}')" class="p-3 bg-[#1a1a1a] hover:bg-[#262626] rounded-md cursor-pointer border border-subtle flex items-center justify-between group transition-colors">
                            <div><span class="text-xs font-bold text-white uppercase tracking-wide bg-blue-900/30 text-blue-400 px-1.5 py-0.5 rounded mr-2">Project</span><span class="text-sm font-medium text-white">${job.name}</span><p class="text-xs text-neutral-500 mt-0.5">${job.address}</p></div>
                            <i data-lucide="arrow-right" class="w-4 h-4 text-neutral-600 group-hover:text-white"></i>
                        </div>`;
                    matches++;
                }
            });

            notes.forEach(note => {
                if(note.content && note.content.toLowerCase().includes(q)) {
                    const parentJob = jobs.find(j => String(j.id) === String(note.jobId));
                    if(parentJob && !parentJob.archived) {
                        resultsHTML += `
                        <div onclick="jumpToJob('${parentJob.id}')" class="p-3 bg-[#1a1a1a] hover:bg-[#262626] rounded-md cursor-pointer border border-subtle flex items-center justify-between group transition-colors">
                            <div class="pr-4"><span class="text-xs font-bold text-white uppercase tracking-wide bg-neutral-800 text-neutral-400 px-1.5 py-0.5 rounded mr-2">Log</span><span class="text-[10px] text-neutral-500">${parentJob.name}</span><p class="text-xs text-neutral-300 mt-1 line-clamp-2">${note.content}</p></div>
                            <i data-lucide="arrow-right" class="w-4 h-4 text-neutral-600 group-hover:text-white shrink-0"></i>
                        </div>`;
                        matches++;
                    }
                }
            });

            if(matches === 0) resultsHTML = `<div class="p-4 text-center text-xs text-neutral-500">No projects or notes found matching "${query}"</div>`;
            container.innerHTML = resultsHTML;
            lucide.createIcons();
        }

        function jumpToJob(jobId) {
            toggleGlobalSearch();
            openJobDetail(jobId);
        }

        // --- PIPELINE FILTER ROUTINES ---
        function setDashboardFilter(status) {
            currentDashboardFilter = status;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-neutral-800', 'text-white', 'border-neutral-600');
                btn.classList.add('input-bg', 'text-neutral-500', 'border-subtle');
            });
            const activeBtn = document.getElementById(`flt-${status}`);
            activeBtn.classList.remove('input-bg', 'text-neutral-500', 'border-subtle');
            activeBtn.classList.add('bg-neutral-800', 'text-white', 'border-neutral-600');
            renderDashboard();
        }

        function timeAgo(dateString) {
            if(!dateString) return '';
            const seconds = Math.floor((new Date() - new Date(dateString)) / 1000);
            let interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + "d ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + "h ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + "m ago";
            return "Just now";
        }

        function toggleStatusMenu(e) {
            e.stopPropagation();
            document.getElementById('statusUpdateMenu').classList.toggle('hidden');
        }

        async function updateJobStatus(newStatus) {
            if (!currentOpenJobId) return;
            try {
                const jobRef = doc(db, "jobs", currentOpenJobId);
                await updateDoc(jobRef, {
                    status: newStatus,
                    updatedAt: new Date().toISOString()
                });
                document.getElementById('statusUpdateMenu').classList.add('hidden');
            } catch (e) {
                console.error("Cloud Status Update Error: ", e);
            }
        }

        // --- SWIPE WRAPPERS ---
        let swipeStartX = 0;
        function tStart(e) { swipeStartX = e.changedTouches[0].screenX; }
        function tEnd(e, elId) {
            let endX = e.changedTouches[0].screenX;
            let el = document.getElementById('swipe-card-' + elId);
            if (!el) return;
            if (swipeStartX - endX > 50) el.style.transform = 'translateX(-70px)';
            else if (endX - swipeStartX > 50) el.style.transform = 'translateX(70px)';
            else el.style.transform = 'translateX(0)';
        }

        // --- HARDWARE DISPATCHED CAPTURE LOGIC ---
        function handleImageSelection(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_DIMENSION = 1000;
                    let width = img.width;
                    let height = img.height;
                    if (width > height && width > MAX_DIMENSION) { height *= MAX_DIMENSION / width; width = MAX_DIMENSION; } 
                    else if (height > MAX_DIMENSION) { width *= MAX_DIMENSION / height; height = MAX_DIMENSION; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    pendingImageData = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('imagePreview').src = pendingImageData;
                    document.getElementById('imagePreviewContainer').classList.remove('hidden');
                };
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function clearImage() {
            pendingImageData = null;
            document.getElementById('cameraInput').value = '';
            document.getElementById('imagePreviewContainer').classList.add('hidden');
            document.getElementById('imagePreview').src = '';
        }

        function openImageViewer(src) {
            document.getElementById('viewerImage').src = src;
            const modal = document.getElementById('imageViewerModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeImageViewer() {
            const modal = document.getElementById('imageViewerModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('viewerImage').src = '';
        }

        async function submitQuickNote() {
            const hiddenId = document.getElementById('quickNoteJobId');
            const btn = document.getElementById('submitNoteBtn');
            const textEl = document.getElementById('quickNoteText');
            
            const text = textEl.value.trim();
            const jobId = hiddenId.value;

            if (!text && !pendingImageData) return alert('Enter text or attach a photo.');
            if (!jobId || !jobs.find(j => String(j.id) === String(jobId))) return alert('Select a valid target job from the dropdown.');

            btn.disabled = true;

            try {
                const noteRef = doc(collection(db, "notes"));
                await setDoc(noteRef, {
                    id: noteRef.id,
                    jobId: jobId,
                    content: text,
                    image: pendingImageData || null,
                    pinned: false,
                    timestamp: new Date().toISOString()
                });

                const jobRef = doc(db, "jobs", jobId);
                await updateDoc(jobRef, {
                    updatedAt: new Date().toISOString()
                });

                resetTextarea();
                clearTargetJob();
                clearImage(); 
                
                const originalText = btn.innerHTML;
                btn.innerHTML = 'Logged ✓';
                btn.classList.replace('bg-white', 'bg-emerald-500');
                btn.classList.replace('text-black', 'text-white');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-emerald-500', 'bg-white');
                    btn.classList.replace('text-white', 'text-black');
                    btn.disabled = false;
                }, 1500);

            } catch (e) {
                console.error("Cloud Sync Write Failure: ", e);
                alert("Failed to sync structural note data to cloud database.");
                btn.disabled = false;
            }
        }

        function setModalStatus(status) {
            document.getElementById('newJobStatus').value = status;
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.classList.remove('bg-neutral-800', 'border-neutral-600', 'text-white');
                btn.classList.add('input-bg', 'border-subtle', 'text-neutral-400');
            });
            const activeBtn = document.getElementById(`btn-status-${status}`);
            activeBtn.classList.remove('input-bg', 'border-subtle', 'text-neutral-400');
            activeBtn.classList.add('bg-neutral-800', 'border-neutral-600', 'text-white');
        }

        function openNewJobModal() {
            document.getElementById('newJobName').value = '';
            document.getElementById('newJobAddress').value = '';
            setModalStatus('contacted');
            document.getElementById('newJobModal').classList.remove('hidden');
            document.getElementById('newJobModal').classList.add('flex');
        }

        function closeNewJobModal() {
            document.getElementById('newJobModal').classList.add('hidden');
            document.getElementById('newJobModal').classList.remove('flex');
        }

        async function saveNewJob() {
            const name = document.getElementById('newJobName').value.trim();
            const address = document.getElementById('newJobAddress').value.trim();
            const status = document.getElementById('newJobStatus').value;
            
            if (!name) return alert('Name required.');

            const timestamp = new Date().toISOString();
            
            try {
                const jobRef = doc(collection(db, "jobs"));
                const newId = jobRef.id;
                
                await setDoc(jobRef, {
                    id: newId,
                    name, address, status,
                    archived: false,
                    createdAt: timestamp,
                    updatedAt: timestamp 
                });
                
                closeNewJobModal();
                setDashboardFilter(status);
                openJobDetail(newId);
            } catch(e) {
                console.error("Cloud Push Aborted: ", e);
                alert("Could not initialize document container.");
            }
        }

        async function deleteNote(event, noteId) {
            event.stopPropagation();
            if(confirm('Permanently delete this note?')) {
                try {
                    await deleteDoc(doc(db, "notes", noteId));
                } catch(e) {
                    console.error("Deletion Mutation Terminated: ", e);
                }
            }
        }

        async function togglePin(event, noteId) {
            event.stopPropagation();
            const note = notes.find(n => String(n.id) === String(noteId));
            if (note) {
                try {
                    await updateDoc(doc(db, "notes", noteId), {
                        pinned: !note.pinned
                    });
                } catch(e) {
                    console.error("Metadata Shift Failed: ", e);
                }
            }
        }

        function startEdit(event, noteId) {
            event.stopPropagation();
            document.getElementById(`note-display-${noteId}`).classList.add('hidden');
            document.getElementById(`note-edit-${noteId}`).classList.remove('hidden');
        }
        
        function cancelEdit(noteId) {
            document.getElementById(`note-display-${noteId}`).classList.remove('hidden');
            document.getElementById(`note-edit-${noteId}`).classList.add('hidden');
        }
        
        async function saveEdit(noteId) {
            const textarea = document.getElementById(`edit-textarea-${noteId}`);
            const newContent = textarea.value.trim();
            try {
                await updateDoc(doc(db, "notes", noteId), {
                    content: newContent
                });
            } catch(e) {
                console.error("Inline Revision Aborted: ", e);
            }
        }

        async function quickArchiveJob(jobId) {
            if(confirm('Archive this job ticket?')) {
                try {
                    await updateDoc(doc(db, "jobs", jobId), {
                        archived: true
                    });
                    if(currentOpenJobId === jobId) {
                        currentOpenJobId = null;
                        document.getElementById('jobDetailHeader').classList.add('hidden');
                        document.getElementById('jobNotesFeed').classList.add('hidden');
                        document.getElementById('emptyDetailState').classList.remove('hidden');
                        if (window.innerWidth < 768) toggleMobileView();
                    }
                } catch(e) {
                    console.error("Archival Interrupted: ", e);
                }
            }
        }

        function archiveCurrentJob() {
            if (currentOpenJobId) quickArchiveJob(currentOpenJobId);
        }

        // --- DOM RENDER ROUTINES ---
        function renderDashboard() {
            const listEl = document.getElementById('jobListContainer');
            if(!listEl) return;

            const activeJobs = jobs.filter(j => !j.archived && (currentDashboardFilter === 'all' || j.status === currentDashboardFilter))
                                   .sort((a,b) => new Date(b.updatedAt || b.createdAt) - new Date(a.updatedAt || a.createdAt));
            let htmlBuffer = '';

            if (activeJobs.length === 0) {
                htmlBuffer = `
                    <div class="flex flex-col items-center justify-center py-10 px-4 text-neutral-600 border border-dashed border-[#262626] rounded-xl bg-[#0a0a0a]">
                        <i data-lucide="inbox" class="w-10 h-10 mb-3 opacity-30"></i>
                        <p class="text-xs font-medium uppercase tracking-wider">No tickets in this pipeline stage.</p>
                    </div>`;
            }

            activeJobs.forEach(job => {
                const jobNotesCount = notes.filter(n => String(n.jobId) === String(job.id)).length;
                const borderClass = `border-l-4 border-t border-r border-b status-${job.status}`;
                const isSelected = String(currentOpenJobId) === String(job.id) ? 'bg-[#1a1a1a] shadow-inner' : 'panel-bg shadow-sm';
                const stamp = timeAgo(job.updatedAt || job.createdAt);

                htmlBuffer += `
                    <div class="relative rounded-lg overflow-hidden border border-transparent mb-3 bg-[#0a0a0a]" ontouchstart="tStart(event)" ontouchend="tEnd(event, '${job.id}')">
                        <div class="absolute inset-0 flex justify-between z-0">
                            <div class="w-20 bg-blue-950 flex flex-col items-center justify-center text-blue-400 cursor-pointer" onclick="updateJobStatusQuick('${job.id}')">
                                <i data-lucide="sliders-horizontal" class="w-5 h-5 mb-1"></i><span class="text-[9px] font-bold uppercase tracking-wider">Status</span>
                            </div>
                            <div class="w-20 bg-red-950 flex flex-col items-center justify-center text-red-500 cursor-pointer" onclick="quickArchiveJob('${job.id}')">
                                <i data-lucide="archive" class="w-5 h-5 mb-1"></i><span class="text-[9px] font-bold uppercase tracking-wider">Archive</span>
                            </div>
                        </div>

                        <div id="swipe-card-${job.id}" class="swipe-card relative z-10 ${isSelected} ${borderClass} rounded-lg p-4 flex items-center justify-between cursor-pointer hover:border-neutral-500" onclick="openJobDetail('${job.id}')">
                            <div class="truncate pr-3">
                                <div class="flex items-center gap-2">
                                    <h3 class="font-bold text-neutral-200 text-sm truncate">${job.name}</h3>
                                </div>
                                <p class="text-xs text-neutral-500 mt-1 truncate">${job.address}</p>
                                <div class="mt-2 text-[10px] text-neutral-600 font-medium tracking-wide"><i data-lucide="clock" class="w-3 h-3 inline pb-0.5"></i> Active ${stamp}</div>
                            </div>
                            <div class="flex flex-col items-end justify-between h-full gap-2 shrink-0">
                                <i data-lucide="chevron-right" class="w-4 h-4 text-neutral-600 md:hidden"></i>
                                <span class="text-[10px] text-neutral-400 bg-black px-2 py-0.5 rounded border border-subtle font-medium">${jobNotesCount} logs</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            listEl.innerHTML = htmlBuffer;
            lucide.createIcons();
        }

        async function updateJobStatusQuick(jobId) {
            const job = jobs.find(j => String(j.id) === String(jobId));
            if (job) {
                const flow = ['contacted', 'estimating', 'quoted', 'done', 'completed'];
                let nextIdx = flow.indexOf(job.status) + 1;
                if(nextIdx >= flow.length) nextIdx = 0;
                
                try {
                    await updateDoc(doc(db, "jobs", jobId), {
                        status: flow[nextIdx],
                        updatedAt: new Date().toISOString()
                    });
                    const card = document.getElementById('swipe-card-' + jobId);
                    if(card) card.style.transform = 'translateX(0)';
                } catch(e) {
                    console.error(e);
                }
            }
        }

        function openJobDetail(jobId) {
            currentOpenJobId = jobId;
            renderJobHeader();

            document.getElementById('emptyDetailState').classList.add('hidden');
            document.getElementById('jobDetailHeader').classList.remove('hidden');
            document.getElementById('jobNotesFeed').classList.remove('hidden');
            
            document.querySelectorAll('.swipe-card').forEach(el => el.style.transform = 'translateX(0)');
            renderDashboard(); 
            renderJobNotes();

            if (window.innerWidth < 768) {
                isMobileDetailView = true;
                applyMobileView();
            }
        }

        function renderJobHeader() {
            if (!currentOpenJobId) return;
            const job = jobs.find(j => String(j.id) === String(currentOpenJobId));
            if (!job) return;
            
            document.getElementById('detailJobName').innerText = job.name;
            
            const addrEl = document.getElementById('detailJobAddress');
            if (job.address) {
                addrEl.innerHTML = `<i data-lucide="map-pin" class="w-3.5 h-3.5"></i> ${job.address}`;
                addrEl.href = `https://maps.apple.com/?q=${encodeURIComponent(job.address)}`;
                addrEl.classList.remove('hidden');
            } else {
                addrEl.classList.add('hidden');
            }

            const statusBtn = document.getElementById('detailJobStatus');
            const statusText = document.getElementById('detailJobStatusText');
            
            const stylingMap = {
                'contacted': { text: 'Contacted', class: 'bg-neutral-800 text-neutral-400 border-neutral-600' },
                'estimating': { text: 'Estimating', class: 'bg-blue-950 text-blue-400 border-blue-900' },
                'quoted': { text: 'Quoted', class: 'bg-amber-950 text-amber-500 border-amber-900' },
                'done': { text: 'Done', class: 'bg-emerald-950 text-emerald-500 border-emerald-900' },
                'completed': { text: 'Completed', class: 'bg-purple-950 text-purple-400 border-purple-900' }
            };
            
            const sMap = stylingMap[job.status] || stylingMap['contacted'];
            statusText.innerText = sMap.text;
            statusBtn.className = `text-[10px] uppercase font-bold px-2 py-1 rounded-sm border flex items-center gap-1 cursor-pointer hover:opacity-80 transition-opacity ${sMap.class}`;
            lucide.createIcons();
        }

        function renderJobNotes() {
            const feedEl = document.getElementById('jobNotesFeed');
            if(!feedEl) return;

            const jobNotes = notes.filter(n => String(n.jobId) === String(currentOpenJobId))
                                  .sort((a, b) => {
                                      if(a.pinned && !b.pinned) return -1;
                                      if(!a.pinned && b.pinned) return 1;
                                      return new Date(a.timestamp) - new Date(b.timestamp);
                                  });

            if (jobNotes.length === 0) {
                feedEl.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center text-neutral-600">
                    <i data-lucide="message-square" class="w-10 h-10 mb-3 opacity-20"></i>
                    <p class="text-sm font-medium">No logs recorded yet.</p>
                </div>`;
                return;
            }

            let htmlBuffer = '';
            let lastDateString = '';

            jobNotes.forEach(note => {
                const dateObj = new Date(note.timestamp);
                const timeString = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                const today = new Date();
                const isToday = dateObj.getDate() === today.getDate() && dateObj.getMonth() === today.getMonth() && dateObj.getFullYear() === today.getFullYear();
                const displayDate = isToday ? "Today" : dateObj.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });

                if(displayDate !== lastDateString) {
                    htmlBuffer += `
                        <div class="w-full flex items-center gap-4 my-2">
                            <div class="h-px bg-[#1f1f1f] flex-1"></div>
                            <span class="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">${displayDate}</span>
                            <div class="h-px bg-[#1f1f1f] flex-1"></div>
                        </div>`;
                    lastDateString = displayDate;
                }

                const imgHtml = note.image ? `
                    <div class="relative w-full h-48 mb-3 rounded-md overflow-hidden border border-subtle bg-black cursor-pointer group/img" onclick="openImageViewer('${note.image}')">
                        <img src="${note.image}" class="w-full h-full object-contain group-hover/img:opacity-75 transition-opacity">
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover/img:opacity-100 transition-opacity pointer-events-none">
                            <i data-lucide="zoom-in" class="w-8 h-8 text-white drop-shadow-md"></i>
                        </div>
                    </div>` : '';

                const pinClass = note.pinned ? 'pinned-note shadow-lg' : 'panel-bg shadow-md';
                const pinIconColor = note.pinned ? 'text-amber-500' : 'text-neutral-300';
                const pinBadge = note.pinned ? `<div class="absolute -top-2 -left-2 bg-amber-950 border border-amber-900 text-amber-500 rounded-full p-1 shadow-md z-10"><i data-lucide="pin" class="w-3 h-3 fill-current"></i></div>` : '';

                htmlBuffer += `
                    <div class="border border-subtle p-4 rounded-xl w-full md:w-[90%] self-end group relative ${pinClass}">
                        ${pinBadge}
                        <div class="absolute -top-3 -right-3 hidden group-hover:flex gap-1.5 z-10">
                            <button onclick="togglePin(event, '${note.id}')" title="Pin Note" class="bg-neutral-800 ${pinIconColor} border border-neutral-600 rounded-full p-2 shadow-lg hover:bg-neutral-700 transition-colors">
                                <i data-lucide="pin" class="w-3.5 h-3.5 ${note.pinned ? 'fill-current' : ''}"></i>
                            </button>
                            <button onclick="startEdit(event, '${note.id}')" title="Edit Note" class="bg-neutral-800 text-neutral-300 border border-neutral-600 rounded-full p-2 shadow-lg hover:bg-neutral-700 hover:text-white transition-colors">
                                <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
                            </button>
                            <button onclick="deleteNote(event, '${note.id}')" title="Delete Note" class="bg-red-950 text-red-500 border border-red-900 rounded-full p-2 shadow-lg hover:bg-red-900 hover:text-white transition-colors">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                        
                        ${imgHtml}
                        
                        <div id="note-display-${note.id}" class="text-[15px] text-neutral-200 whitespace-pre-wrap leading-relaxed">${note.content}</div>
                        
                        <div id="note-edit-${note.id}" class="hidden flex-col gap-2 mt-1">
                            <textarea id="edit-textarea-${note.id}" class="w-full input-bg border border-subtle rounded-md p-3 text-sm text-white resize-none focus:outline-none focus:border-neutral-500" rows="3">${note.content}</textarea>
                            <div class="flex justify-end gap-2 mt-2">
                                <button onclick="cancelEdit('${note.id}')" class="text-xs font-medium text-neutral-400 hover:text-white px-3 py-1.5 transition-colors">Cancel</button>
                                <button onclick="saveEdit('${note.id}')" class="text-xs bg-white text-black font-bold px-4 py-1.5 rounded-md hover:bg-neutral-200 transition-colors">Save Update</button>
                            </div>
                        </div>

                        <div class="flex justify-end mt-3 pt-3 border-t border-[#1f1f1f]">
                            <span class="text-[10px] font-medium text-neutral-500 tracking-wider">${timeString}</span>
                        </div>
                    </div>
                `;
            });
            
            feedEl.innerHTML = htmlBuffer;
            feedEl.scrollTop = feedEl.scrollHeight;
            lucide.createIcons();
        }

        // --- INTERACTIVE RESPONSIVE VIEWPORTS ---
        function toggleMobileView() {
            isMobileDetailView = !isMobileDetailView;
            applyMobileView();
        }

        function applyMobileView() {
            const left = document.getElementById('leftPanel');
            const right = document.getElementById('rightPanel');
            const toggleBtn = document.getElementById('mobileToggleBtn');

            if (isMobileDetailView) {
                left.classList.add('-translate-x-full');
                right.classList.remove('hidden');
                right.classList.remove('translate-x-full');
                toggleBtn.innerText = 'Active Board';
            } else {
                left.classList.remove('-translate-x-full');
                right.classList.add('translate-x-full');
                setTimeout(() => right.classList.add('hidden'), 300); 
                toggleBtn.innerText = 'View Job Details';
            }
        }

        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) {
                document.getElementById('leftPanel').classList.remove('-translate-x-full');
                document.getElementById('rightPanel').classList.remove('hidden', 'translate-x-full');
            } else {
                applyMobileView();
            }
        });

        // --- GLOBAL EXPOSURE BRIDGE (MODULE SCOPE COMPLIANCE) ---
        window.autoExpand = autoExpand;
        window.clearTargetJob = clearTargetJob;
        window.toggleGlobalSearch = toggleGlobalSearch;
        window.executeGlobalSearch = executeGlobalSearch;
        window.jumpToJob = jumpToJob;
        window.setDashboardFilter = setDashboardFilter;
        window.toggleStatusMenu = toggleStatusMenu;
        window.updateJobStatus = updateJobStatus;
        window.handleImageSelection = handleImageSelection;
        window.clearImage = clearImage;
        window.openImageViewer = openImageViewer;
        window.closeImageViewer = closeImageViewer;
        window.submitQuickNote = submitQuickNote;
        window.setModalStatus = setModalStatus;
        window.openNewJobModal = openNewJobModal;
        window.closeNewJobModal = closeNewJobModal;
        window.saveNewJob = saveNewJob;
        window.deleteNote = deleteNote;
        window.togglePin = togglePin;
        window.startEdit = startEdit;
        window.cancelEdit = cancelEdit;
        window.saveEdit = saveEdit;
        window.quickArchiveJob = quickArchiveJob;
        window.archiveCurrentJob = archiveCurrentJob;
        window.updateJobStatusQuick = updateJobStatusQuick;
        window.openJobDetail = openJobDetail;
        window.toggleMobileView = toggleMobileView;
        window.tStart = tStart;
        window.tEnd = tEnd;
    </script>
</body>
